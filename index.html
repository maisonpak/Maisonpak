async function gonder(data, konu) {
  try {
    const payload = {
      access_key: W3F,
      subject: "Maisonpak - " + konu,
      from_name: data.name || "Ziyaretci",
      email: data.email || "temizlik@maisonpak.com",
    };
    Object.keys(data).forEach(k => { if(data[k]) payload[k] = data[k]; });
    fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    return true;
  } catch(e) { return true; }
}
